baseURL: ''
title: Francisco Sanhueza Matamala
languageCode: en-us
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: true
canonifyURLs: true
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

pagination:
  pagerSize: 9

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Nusser Studios
  authorimage: ../assets/images/global/Panchito_drawing.png
  og_image: /images/Panchito_drawing.png
  moto: "Master in Applied Mathematics."
  description: "Data and ML Engineering"
  disable_theme_toggle: false
  disable_stay_uptodate: true

  p1:
    heading: "About me"
    image: "images/pages/panchito_photo.jpg"
    content:
      - text: "I've built scalable pipelines, dealing with extraction, data warehousing and serving data for analytics, leading several projects with interdisciplinary teams and taking care of following strict standards of code quality."
      - text: "Interested in implementing data infrastructure for data analytics and data science to help solving real world problems. Goal-oriented, team player and always learning something new."
      - text: "I have worked as a Data Engineer in top Chilean startups, implemententing batch and streaming pipelines from scratch, using tools like Airflow, Bigquery, dbt, Prefect, Docker and Quix Streams."
      - text: "Co-founder of the Santiago Tensorflow User group where we organize talks on state-of-the-art applications of Machine Learning."
      - text: "I'm currently working as a Data Scientist at Noisegrasp and living in Mexico with my wife. If you want to work with me, [click on this link to send me an email!](/contact/)"
      #- text: "My other areas of interest is how to solve problems of optimization with applications on resource management, like vehicle routing or scheduling problems."
 
